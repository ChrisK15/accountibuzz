name: RLS Check

on: [push, pull_request]

jobs:
  rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 1.219.0  # Pitfall 7 — pin explicitly

      - name: Start Supabase stack
        run: supabase start

      - name: Apply migrations + seed
        run: supabase db reset

      - name: Probe — every public table must have RLS enabled
        run: |
          OFF=$(PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -tAc "
            SELECT format('%I.%I', schemaname, tablename)
            FROM pg_tables
            WHERE schemaname = 'public' AND rowsecurity = false;
          ")
          if [ -n "$OFF" ]; then
            echo "::error::Public tables without RLS: $OFF"
            exit 1
          fi
          echo "All public tables have RLS enabled."

      - name: Probe — every public table must have at least one policy
        run: |
          NOPOLICY=$(PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -tAc "
            SELECT format('%I.%I', t.schemaname, t.tablename)
            FROM pg_tables t
            WHERE t.schemaname = 'public'
              AND NOT EXISTS (
                SELECT 1 FROM pg_policies p
                WHERE p.schemaname = t.schemaname AND p.tablename = t.tablename
              );
          ")
          if [ -n "$NOPOLICY" ]; then
            echo "::error::Public tables with RLS enabled but no policy: $NOPOLICY"
            exit 1
          fi
          echo "All public tables have at least one policy."

      - name: Probe — storage.objects must have RLS enabled
        run: |
          OFF=$(PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -tAc "
            SELECT rowsecurity FROM pg_tables
            WHERE schemaname = 'storage' AND tablename = 'objects';
          ")
          if [ "$OFF" != "t" ]; then
            echo "::error::storage.objects RLS is disabled"
            exit 1
          fi
          echo "storage.objects has RLS enabled."

      - name: Probe — storage buckets must have matching policies
        run: |
          MISSING=$(PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -tAc "
            SELECT b.id
            FROM storage.buckets b
            WHERE b.id IN ('submissions', 'avatars')
              AND NOT EXISTS (
                SELECT 1 FROM pg_policies
                WHERE schemaname = 'storage' AND tablename = 'objects'
                  AND qual LIKE '%' || b.id || '%'
              );
          ")
          if [ -n "$MISSING" ]; then
            echo "::error::Buckets missing policies: $MISSING"
            exit 1
          fi
          echo "All required storage buckets have policies."

      - name: Run pgTAP tests
        run: supabase test db
